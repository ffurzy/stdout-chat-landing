name: Append public update

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [ios-update]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated updates.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve commit metadata
        id: meta
        run: |
          # repository_dispatch passes data via client_payload; push uses head_commit
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "msg=${{ github.event.client_payload.commit_message }}"   >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.client_payload.commit_sha }}"       >> $GITHUB_OUTPUT
            echo "date=${{ github.event.client_payload.commit_date }}"     >> $GITHUB_OUTPUT
          else
            echo "msg=${{ github.event.head_commit.message }}"             >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.head_commit.id }}"                  >> $GITHUB_OUTPUT
            echo "date=${{ github.event.head_commit.timestamp }}"          >> $GITHUB_OUTPUT
          fi

      - name: Run append-update script
        env:
          COMMIT_MESSAGE: ${{ steps.meta.outputs.msg }}
          COMMIT_SHA:     ${{ steps.meta.outputs.sha }}
          COMMIT_DATE:    ${{ steps.meta.outputs.date }}
        run: |
          # Strip to YYYY-MM-DD (timestamp is ISO 8601)
          export COMMIT_DATE="${COMMIT_DATE:0:10}"
          node scripts/append-update.js

      - name: Commit updated updates.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git diff --quiet updates.json && {
            echo "updates.json unchanged — nothing to commit."
            exit 0
          }

          git add updates.json
          git commit -m "chore: auto-append update entry [skip ci]"
          git push
