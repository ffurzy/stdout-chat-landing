name: Rebuild updates page

# Triggered by VoidChat when CHANGELOG.md changes (repository_dispatch: ios-update),
# or manually. Checks out VoidChat, parses its CHANGELOG.md "What's New" sections
# into updates.json, regenerates updates.html, commits both.
on:
  repository_dispatch:
    types: [ios-update]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push regenerated updates.json + updates.html

    steps:
      - name: Checkout landing
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout VoidChat (CHANGELOG source)
        uses: actions/checkout@v4
        with:
          repository: ffurzy/stdout-chat-ios
          ref: main
          token: ${{ secrets.VOIDCHAT_READ_TOKEN }}
          path: VoidChat
          fetch-depth: 1
          sparse-checkout: |
            CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse CHANGELOG -> updates.json
        env:
          CHANGELOG_PATH: VoidChat/CHANGELOG.md
        run: node scripts/build-updates.js

      - name: Render updates.json -> updates.html
        run: node scripts/render-updates.js

      - name: Commit regenerated files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add updates.json updates.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: rebuild updates page from CHANGELOG [skip ci]"
          git push
