<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>updates — stdout.chat</title>

  <!-- Open Graph -->
  <meta property="og:title" content="updates — stdout.chat" />
  <meta property="og:description" content="Product updates, fixes, and improvements to stdout.chat." />
  <meta property="og:url" content="https://stdout.chat/updates" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="updates — stdout.chat" />
  <meta name="twitter:description" content="Product updates, fixes, and improvements to stdout.chat." />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='3' y='24' font-family='monospace' font-size='20' font-weight='bold' fill='%2300ff41'>%3E_</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='3' y='24' font-family='monospace' font-size='20' font-weight='bold' fill='%2300ff41'>%3E_</text></svg>" />

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/updates.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo"><span>stdout</span>.chat</a>
    <div class="dot"></div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <div class="wrap">
      <p class="page-tag">// changelog</p>
      <h1>updates</h1>
      <p class="sub">
        fixes, features, and improvements to stdout.chat.<br>
        published here as things ship.
      </p>
    </div>
  </section>

  <!-- UPDATES FEED -->
  <section class="updates-section" id="updates-feed">
    <div class="wrap">
      <p class="section-label">// recent updates</p>

      <!-- rendered by JS from updates.json -->
      <div id="feed-root"></div>

      <div class="load-older done" id="load-older-btn">
        <button class="btn-load" onclick="loadOlder()">▸ load older updates</button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <span class="footer-left"><span style="color:var(--green)">stdout</span>.chat — private. ephemeral. text only.</span>
    <span class="footer-right">
      <a href="/privacy" style="color:var(--dim);text-decoration:none">privacy</a>
      &nbsp;·&nbsp;
      <a href="/terms" style="color:var(--dim);text-decoration:none">terms</a>
      &nbsp;·&nbsp;
      <a href="/updates" style="color:var(--green);text-decoration:none">updates</a>
    </span>
  </footer>

  <script>
    // ─── config ───────────────────────────────────────────────
    const MONTHS_INITIALLY_VISIBLE = 1; // show only the latest N month groups
    const MONTHS_PER_LOAD          = 3; // reveal this many per "load older" click

    // ─── month label helper ───────────────────────────────────
    const MONTH_NAMES = [
      'january','february','march','april','may','june',
      'july','august','september','october','november','december'
    ];
    function monthLabel(dateStr) {
      const [y, m] = dateStr.split('-').map(Number);
      return `// ${MONTH_NAMES[m - 1]} ${y}`;
    }

    // ─── group entries by month key "YYYY-MM" ─────────────────
    function groupByMonth(entries) {
      const map = new Map();
      for (const e of entries) {
        const key = e.date.slice(0, 7); // "YYYY-MM"
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(e);
      }
      // sort months newest-first
      return [...map.entries()].sort((a, b) => b[0].localeCompare(a[0]));
    }

    // ─── build a single entry article ────────────────────────
    function buildEntry(e) {
      const article = document.createElement('article');
      article.className = 'update-entry';

      const meta = document.createElement('div');
      meta.className = 'entry-meta';

      const time = document.createElement('time');
      time.className = 'entry-date';
      time.dateTime  = e.date;
      time.textContent = e.date;

      const tag = document.createElement('span');
      tag.className = `entry-tag tag-${e.type}`;
      tag.textContent = e.type;

      meta.append(time, tag);

      const title = document.createElement('h2');
      title.className = 'entry-title';
      title.textContent = e.title;

      const body = document.createElement('p');
      body.className = 'entry-body';
      body.textContent = e.body;

      article.append(meta, title, body);
      return article;
    }

    // ─── build a month section ────────────────────────────────
    function buildMonth(key, entries, isOlder) {
      const section = document.createElement('section');
      section.className = isOlder ? 'month-group older' : 'month-group';
      section.dataset.monthKey = key;

      const h3 = document.createElement('h3');
      h3.className = 'month-label';
      h3.textContent = monthLabel(entries[0].date);

      section.append(h3);
      for (const e of entries) section.append(buildEntry(e));
      return section;
    }

    // ─── load older ───────────────────────────────────────────
    function loadOlder() {
      const hidden = Array.from(document.querySelectorAll('.month-group.older:not(.visible)'));
      hidden.slice(0, MONTHS_PER_LOAD).forEach(g => g.classList.add('visible'));
      if (document.querySelectorAll('.month-group.older:not(.visible)').length === 0) {
        document.getElementById('load-older-btn').classList.add('done');
      }
    }

    // ─── main: fetch + render ─────────────────────────────────
    (async () => {
      const root = document.getElementById('feed-root');
      const btn  = document.getElementById('load-older-btn');

      let entries;
      try {
        const res = await fetch('updates.json');
        if (!res.ok) throw new Error(res.status);
        entries = await res.json();
      } catch (err) {
        root.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠</div>
            <p class="empty-title">could not load updates</p>
            <p class="empty-hint">updates.json missing or invalid.<br>${err}</p>
          </div>`;
        return;
      }

      if (!entries.length) {
        root.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">_</div>
            <p class="empty-title">nothing here yet</p>
            <p class="empty-hint">updates will appear here as things ship.</p>
          </div>`;
        return;
      }

      // sort entries newest-first within each month
      entries.sort((a, b) => b.date.localeCompare(a.date));

      const groups = groupByMonth(entries);
      groups.forEach(([key, monthEntries], i) => {
        const isOlder = i >= MONTHS_INITIALLY_VISIBLE;
        root.append(buildMonth(key, monthEntries, isOlder));
      });

      // show "load older" button only when there's something hidden
      if (document.querySelectorAll('.month-group.older').length > 0) {
        btn.classList.remove('done');
      }
    })();
  </script>

  <script>window.si=window.si||function(){(window.siq=window.siq||[]).push(arguments)};</script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
