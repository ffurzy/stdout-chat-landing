<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>updates — stdout.chat</title>

  <!-- Open Graph -->
  <meta property="og:title" content="updates — stdout.chat" />
  <meta property="og:description" content="Product updates, fixes, and improvements to stdout.chat." />
  <meta property="og:url" content="https://stdout.chat/updates" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="updates — stdout.chat" />
  <meta name="twitter:description" content="Product updates, fixes, and improvements to stdout.chat." />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='3' y='24' font-family='monospace' font-size='20' font-weight='bold' fill='%2300ff41'>%3E_</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='3' y='24' font-family='monospace' font-size='20' font-weight='bold' fill='%2300ff41'>%3E_</text></svg>" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #00ff41;
      --blue:  #00bfff;
      --red:   #ff4444;
      --dim:   #555555;
      --body:  #888888;   /* ↑ was #555 — readable on dim monitors */
      --line:  #111111;
      --bg:    #000000;
    }

    html, body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── scanline overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ─── container ─── */
    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── nav ─── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      max-width: 680px;
      margin: 0 auto;
    }

    .nav-logo {
      font-size: 14px;
      color: var(--dim);
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .nav-logo span { color: var(--green); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ─── page header ─── */
    .page-header {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--line);
    }

    .page-tag {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .page-header h1 {
      font-size: clamp(24px, 5vw, 42px);
      font-weight: normal;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--green);
      margin-bottom: 16px;
    }

    .page-header .sub {
      font-size: 13px;
      color: var(--body);
      line-height: 1.8;
      max-width: 480px;
    }

    /* ─── section label ─── */
    .section-label {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ─── updates feed ─── */
    .updates-section {
      padding: 60px 0;
      border-bottom: 1px solid var(--line);
    }

    /* ─── empty state ─── */
    .empty-state {
      border: 1px solid var(--line);
      background: #050505;
      padding: 48px 32px;
      text-align: center;
    }

    .empty-icon {
      font-size: 28px;
      margin-bottom: 20px;
      opacity: 0.4;
    }

    .empty-title {
      font-size: 13px;
      color: var(--body);
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .empty-hint {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
    }

    /* ─── month group ─── */
    /*
      Entries are grouped by month using <section class="month-group"> wrappers.
      Structure:

        <section class="month-group">
          <h3 class="month-label">// march 2026</h3>
          <article class="update-entry"> ... </article>
          <article class="update-entry"> ... </article>
        </section>
    */

    .month-group {
      margin-bottom: 8px;
    }

    .month-label {
      font-size: 11px;
      font-weight: normal;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 20px 0 16px;
      border-top: 1px solid var(--line);
    }

    /* ─── update entry ─── */
    /*
      Each entry:

        <article class="update-entry">
          <div class="entry-meta">
            <time class="entry-date">YYYY-MM-DD</time>
            <span class="entry-tag tag-fix">fix</span>   ← or tag-feat / tag-impr
          </div>
          <h2 class="entry-title">Short title</h2>
          <p class="entry-body">Description.</p>
        </article>

      Tag classes and labels:
        tag-fix  → "fix"
        tag-feat → "feat"
        tag-impr → "impr"
    */

    .update-entry {
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }

    .update-entry:last-child {
      border-bottom: none;
    }

    .entry-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .entry-date {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.08em;
    }

    /* ─── tags: fixed 4-char width so all align ─── */
    .entry-tag {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 0;
      width: 36px;          /* fits "feat" / "fix " / "impr" uniformly */
      text-align: center;
      border: 1px solid currentColor;
      flex-shrink: 0;
    }

    .tag-fix  { color: var(--red);   }
    .tag-feat { color: var(--green); }
    .tag-impr { color: var(--blue);  }

    .entry-title {
      font-size: 15px;
      font-weight: normal;
      color: var(--green);
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }

    .entry-body {
      font-size: 12px;
      color: var(--body);   /* #888 — higher contrast than old #555 */
      line-height: 1.85;
    }

    /* ─── load older button ─── */
    .load-older {
      margin-top: 40px;
      text-align: center;
    }

    .btn-load {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-load:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* hidden older groups */
    .month-group.older { display: none; }
    .month-group.older.visible { display: block; }

    /* hide button when all groups revealed */
    .load-older.done { display: none; }

    /* ─── footer ─── */
    footer {
      padding: 32px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      max-width: 680px;
      margin: 0 auto;
    }

    .footer-left  { font-size: 11px; color: var(--dim); }
    .footer-right { font-size: 11px; color: var(--dim); opacity: 0.5; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo"><span>stdout</span>.chat</a>
    <div class="dot"></div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <div class="wrap">
      <p class="page-tag">// changelog</p>
      <h1>updates</h1>
      <p class="sub">
        fixes, features, and improvements to stdout.chat.<br>
        published here as things ship.
      </p>
    </div>
  </section>

  <!-- UPDATES FEED -->
  <section class="updates-section" id="updates-feed">
    <div class="wrap">
      <p class="section-label">// recent updates</p>

      <!-- rendered by JS from updates.json -->
      <div id="feed-root"></div>

      <div class="load-older done" id="load-older-btn">
        <button class="btn-load" onclick="loadOlder()">▸ load older updates</button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <span class="footer-left"><span style="color:var(--green)">stdout</span>.chat — anonymous. ephemeral. text only.</span>
    <span class="footer-right">
      <a href="/privacy" style="color:var(--dim);text-decoration:none">privacy</a>
      &nbsp;·&nbsp;
      <a href="/terms" style="color:var(--dim);text-decoration:none">terms</a>
      &nbsp;·&nbsp;
      <a href="/updates" style="color:var(--green);text-decoration:none">updates</a>
    </span>
  </footer>

  <script>
    // ─── config ───────────────────────────────────────────────
    const MONTHS_INITIALLY_VISIBLE = 1; // show only the latest N month groups
    const MONTHS_PER_LOAD          = 3; // reveal this many per "load older" click

    // ─── month label helper ───────────────────────────────────
    const MONTH_NAMES = [
      'january','february','march','april','may','june',
      'july','august','september','october','november','december'
    ];
    function monthLabel(dateStr) {
      const [y, m] = dateStr.split('-').map(Number);
      return `// ${MONTH_NAMES[m - 1]} ${y}`;
    }

    // ─── group entries by month key "YYYY-MM" ─────────────────
    function groupByMonth(entries) {
      const map = new Map();
      for (const e of entries) {
        const key = e.date.slice(0, 7); // "YYYY-MM"
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(e);
      }
      // sort months newest-first
      return [...map.entries()].sort((a, b) => b[0].localeCompare(a[0]));
    }

    // ─── build a single entry article ────────────────────────
    function buildEntry(e) {
      const article = document.createElement('article');
      article.className = 'update-entry';

      const meta = document.createElement('div');
      meta.className = 'entry-meta';

      const time = document.createElement('time');
      time.className = 'entry-date';
      time.dateTime  = e.date;
      time.textContent = e.date;

      const tag = document.createElement('span');
      tag.className = `entry-tag tag-${e.type}`;
      tag.textContent = e.type;

      meta.append(time, tag);

      const title = document.createElement('h2');
      title.className = 'entry-title';
      title.textContent = e.title;

      const body = document.createElement('p');
      body.className = 'entry-body';
      body.textContent = e.body;

      article.append(meta, title, body);
      return article;
    }

    // ─── build a month section ────────────────────────────────
    function buildMonth(key, entries, isOlder) {
      const section = document.createElement('section');
      section.className = isOlder ? 'month-group older' : 'month-group';
      section.dataset.monthKey = key;

      const h3 = document.createElement('h3');
      h3.className = 'month-label';
      h3.textContent = monthLabel(entries[0].date);

      section.append(h3);
      for (const e of entries) section.append(buildEntry(e));
      return section;
    }

    // ─── load older ───────────────────────────────────────────
    function loadOlder() {
      const hidden = Array.from(document.querySelectorAll('.month-group.older:not(.visible)'));
      hidden.slice(0, MONTHS_PER_LOAD).forEach(g => g.classList.add('visible'));
      if (document.querySelectorAll('.month-group.older:not(.visible)').length === 0) {
        document.getElementById('load-older-btn').classList.add('done');
      }
    }

    // ─── main: fetch + render ─────────────────────────────────
    (async () => {
      const root = document.getElementById('feed-root');
      const btn  = document.getElementById('load-older-btn');

      let entries;
      try {
        const res = await fetch('updates.json');
        if (!res.ok) throw new Error(res.status);
        entries = await res.json();
      } catch (err) {
        root.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠</div>
            <p class="empty-title">could not load updates</p>
            <p class="empty-hint">updates.json missing or invalid.<br>${err}</p>
          </div>`;
        return;
      }

      if (!entries.length) {
        root.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">_</div>
            <p class="empty-title">nothing here yet</p>
            <p class="empty-hint">updates will appear here as things ship.</p>
          </div>`;
        return;
      }

      // sort entries newest-first within each month
      entries.sort((a, b) => b.date.localeCompare(a.date));

      const groups = groupByMonth(entries);
      groups.forEach(([key, monthEntries], i) => {
        const isOlder = i >= MONTHS_INITIALLY_VISIBLE;
        root.append(buildMonth(key, monthEntries, isOlder));
      });

      // show "load older" button only when there's something hidden
      if (document.querySelectorAll('.month-group.older').length > 0) {
        btn.classList.remove('done');
      }
    })();
  </script>

</body>
</html>
